<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Προσομοίωση ΑΑΤ - Λύκειο</title>
    <style>
        body { font-family: sans-serif; background: white; display: flex; flex-direction: column; align-items: center; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 15px; background: #f0f0f0; padding: 15px; border-radius: 8px; }
        .btn-container { grid-column: span 3; display: flex; justify-content: center; gap: 10px; }
        canvas { border: 1px solid #ccc; background: #fff; }
        label { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
        span { font-weight: bold; min-width: 30px; }
    </style>
</head>
<body>

    <h2>Προσομοίωση Κατακόρυφου Ταλαντωτή</h2>
    
    <div class="controls">
        <div class="btn-container">
            <button id="playBtn" style="font-size:16px; padding:6px 20px; cursor:pointer;">Play</button>
            <button id="resetBtn" style="font-size:16px; padding:6px 20px; cursor:pointer;">Reset</button>
        </div>
        <label>k (N/m): <input type="range" id="kSlider" min="5" max="50" value="25" step="1"><span id="kVal">25</span></label>
        <label>m (kg): <input type="range" id="mSlider" min="0.5" max="5" value="1.5" step="0.1"><span id="mVal">1.5</span></label>
        <label>b (Ns/m): <input type="range" id="bSlider" min="0" max="4" value="0.4" step="0.1"><span id="bVal">0.4</span></label>
        <label style="grid-column: span 3; justify-content: center; color: blue;">
            Αρχική Θέση y₀ (m): <input type="range" id="y0Slider" min="-8" max="8" value="4" step="0.5"><span id="y0Val">4.0</span></label>
    </div>

    <canvas id="simCanvas" width="600" height="500"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        let y = 0, v = 0, t = 0;
        let isPlaying = false;
        
        let yMaxPhys = -Infinity;
        let yMinPhys = Infinity;

        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        const kSlider = document.getElementById('kSlider');
        const mSlider = document.getElementById('mSlider');
        const bSlider = document.getElementById('bSlider');
        const y0Slider = document.getElementById('y0Slider');

        function initPhysics() {
            // Διορθωμένο: Παίρνει Live την τιμή από το Slider!
            let y0 = parseFloat(y0Slider.value);
            // Διορθωμένο: Ξεκινάει τη μάζα στο t=0.00s (στην αρχική θέση y0)
            y = 250 - (y0 * 20); 
            v = 0;
            t = 0;
            yMaxPhys = y0;
            yMinPhys = y0;
        }

        playBtn.onclick = () => { isPlaying = !isPlaying; playBtn.innerText = isPlaying ? "Pause" : "Play"; };
        resetBtn.onclick = () => { isPlaying = false; playBtn.innerText = "Play"; initPhysics(); };
        
        // Αν αλλάξει οποιοδήποτε slider, μηδένισε ομαλά την κίνηση στις νέες αρχικές συνθήκες
        [kSlider, mSlider, bSlider, y0Slider].forEach(slider => slider.oninput = initPhysics);

        initPhysics();

        function loop() {
            let k = parseFloat(kSlider.value);
            let m = parseFloat(mSlider.value);
            let b = parseFloat(bSlider.value);
            let y0 = parseFloat(y0Slider.value);
            
            document.getElementById('kVal').innerText = k;
            document.getElementById('mVal').innerText = m;
            document.getElementById('bVal').innerText = b;
            document.getElementById('y0Val').innerText = y0.toFixed(1);

            let y_phys = -(y - 250) / 20;

            if (isPlaying) {
                let dt = 0.02; // Μικρό dt = πιο αργή, ομαλή και ακριβής κίνηση
                let a = -(k * y_phys) / m - 9.81 - (b * v) / m;
                v += a * dt;
                y_phys += v * dt;
                y = 250 - (y_phys * 20);
                t += dt;

                // Καταγραφή ακρότατων
                if (y_phys > yMaxPhys) yMaxPhys = y_phys;
                if (y_phys < yMinPhys) yMinPhys = y_phys;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Πλέγμα & Αριθμοί
            ctx.strokeStyle = '#eee'; ctx.lineWidth = 1; ctx.fillStyle = '#666'; ctx.font = '12px sans-serif'; ctx.textAlign = 'right';
            for(let i = 50; i < 500; i += 50) {
                ctx.beginPath(); ctx.moveTo(50, i); ctx.lineTo(400, i); ctx.stroke();
                let phys_val = -(i - 250) / 20; 
                ctx.fillText(phys_val.toFixed(1) + " m", 45, i + 4);
            }
            for(let i = 50; i <= 400; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 500); ctx.stroke();
            }

            // Πράσινη Γραμμή: Θέση Ισορροπίας
            let y_eq_phys = -(m * 9.81 / k);
            let y_eq_pixel = 250 - (y_eq_phys * 20);
            ctx.strokeStyle = 'green'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(50, y_eq_pixel); ctx.lineTo(400, y_eq_pixel); 
            ctx.stroke(); // Διορθωμένο: Προσθέσαμε τη stroke() για να σχεδιάζεται!

            // Κόκκινες Γραμμές: Ακραίες Θέσεις
            let y_max_pixel = 250 - (yMaxPhys * 20);
            let y_min_pixel = 250 - (yMinPhys * 20);
            ctx.strokeStyle = 'red'; ctx.lineWidth = 1.2; ctx.setLineDash([3, 4]);
            ctx.beginPath(); ctx.moveTo(50, y_max_pixel); ctx.lineTo(400, y_max_pixel); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(50, y_min_pixel); ctx.lineTo(400, y_min_pixel); ctx.stroke();
            ctx.setLineDash([]); // Reset line dash

            // ΝΕΟ ΥΠΟΜΝΗΜΑ (Σπρώχτηκε στα δεξιά, x=415, έξω από το πλέγμα)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)'; ctx.fillRect(415, 15, 175, 60);
            ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1; ctx.strokeRect(415, 15, 175, 60);
            ctx.fillStyle = 'black'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
            
            // Πράσινη επεξήγηση
            ctx.strokeStyle = 'green'; ctx.lineWidth = 2; ctx.setLineDash([3, 3]);
            ctx.beginPath(); ctx.moveTo(425, 32); ctx.lineTo(445, 32); ctx.stroke();
            ctx.fillText("Θέση Ισορροπίας (y_eq)", 452, 36);
            
            // Κόκκινη επεξήγηση
            ctx.strokeStyle = 'red'; ctx.lineWidth = 2; ctx.setLineDash([2, 2]);
            ctx.beginPath(); ctx.moveTo(425, 52); ctx.lineTo(445, 52); ctx.stroke();
            ctx.fillText("Ακραίες Θέσεις (y_max/min)", 452, 56);
            ctx.setLineDash([]);

            // Ταβάνι, Ελατήριο, Μάζα
            ctx.fillStyle = 'black'; ctx.fillRect(125, 20, 200, 10);
            ctx.strokeStyle = 'gray'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(225, 30);
            let joints = 25;
            for (let i = 1; i <= joints; i++) {
                let curr_y = 30 + (y - 30) * (i / joints);
                let curr_x = 225 + (i === joints ? 0 : (i % 2 === 0 ? 15 : -15));
                ctx.lineTo(curr_x, curr_y);
            }
            ctx.stroke();

            ctx.beginPath(); ctx.arc(225, y, 20, 0, 2 * Math.PI); ctx.fillStyle = 'blue'; ctx.fill();

            // Χρόνος
            ctx.fillStyle = 'black'; ctx.font = '16px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText("t = " + t.toFixed(2) + " s", 60, 40);

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
