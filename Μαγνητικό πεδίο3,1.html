<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Προσομοίωση Δύναμης Lorentz</title>
    <style>
        body { font-family: sans-serif; background: white; display: flex; flex-direction: column; align-items: center; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 15px; background: #f0f0f0; padding: 15px; border-radius: 8px; width: 620px; }
        .btn-container { grid-column: span 3; display: flex; justify-content: center; gap: 15px; margin-bottom: 5px; }
        canvas { border: 1px solid #ccc; background: #fff; }
        label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; font-weight: 500; }
        .slider-container { display: flex; align-items: center; gap: 8px; }
        span { font-weight: bold; min-width: 30px; }
        select { padding: 4px; font-weight: bold; width: 100%; border-radius: 4px; border: 1px solid #ccc; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>

    <h2>Κίνηση Φορτίου σε Μαγνητικό Πεδίο (2D)</h2>
    
    <div class="controls">
        <div class="btn-container">
            <button id="playBtn" style="font-size:16px; padding:6px 20px; cursor:pointer;">Play</button>
            <button id="resetBtn" style="font-size:16px; padding:6px 20px; cursor:pointer;">Reset</button>
        </div>
        
        <label>Τύπος Φορτίου: 
            <select id="qSign">
                <option value="1">Θετικό (+q)</option>
                <option value="-1">Αρνητικό (-q)</option>
            </select>
        </label>

        <label>Φορά Πεδίου B: 
            <select id="bDir">
                <option value="1">Προς τα Μέσα (X)</option>
                <option value="-1">Προς τα Έξω (•)</option>
            </select>
        </label>

        <label>Ένταση B (T): 
            <div class="slider-container">
                <input type="range" id="bSlider" min="0.5" max="3" value="1.5" step="0.1">
                <span id="bVal">1.5</span>
            </div>
        </label>

        <label>Φορτίο q (μC): 
            <div class="slider-container">
                <input type="range" id="qSlider" min="1" max="5" value="2" step="0.5">
                <span id="qVal">2.0</span>
            </div>
        </label>

        <label>Ταχύτητα v₀ (m/s): 
            <div class="slider-container">
                <input type="range" id="vSlider" min="10" max="40" value="25" step="1">
                <span id="vVal">25</span>
            </div>
        </label>

        <label>Μάζα m (kg): 
            <div class="slider-container">
                <input type="range" id="mSlider" min="1" max="5" value="2" step="0.5">
                <span id="mVal">2.0</span>
            </div>
        </label>

        <label style="grid-column: span 3; color: blue; font-weight: bold;">
            Ύψος Εισόδου y_in (m):
            <div class="slider-container">
                <input type="range" id="yInSlider" min="50" max="350" value="200" step="10">
                <span id="yInVal">200</span>
            </div>
        </label>
    </div>

    <canvas id="simCanvas" width="650" height="480"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        // Όρια πεδίου σε pixels
        const xMinPixels = 100;
        const xMaxPixels = 600;
        const yMinPixels = 30;
        const yMaxPixels = 430; // Εδώ είναι το μηδέν (0m) του φυσικού άξονα y

        let x, y, vx, vy, t = 0;
        let isPlaying = false;
        let trajectory = []; 

        const playBtn = document.getElementById('playBtn'), resetBtn = document.getElementById('resetBtn');
        const qSignSelect = document.getElementById('qSign'), bDirSelect = document.getElementById('bDir');
        const bSlider = document.getElementById('bSlider'), qSlider = document.getElementById('qSlider');
        const vSlider = document.getElementById('vSlider'), mSlider = document.getElementById('mSlider');
        const yInSlider = document.getElementById('yInSlider');

        function initPhysics() {
            x = 50;           
            
            // Υπολογισμός pixel y με βάση την τιμή του slider (το 0 είναι κάτω, άρα αφαιρούμε από το yMaxPixels)
            let yInPhys = parseFloat(yInSlider.value);
            y = yMaxPixels - yInPhys; 
            
            vx = parseFloat(vSlider.value);
            vy = 0;           
            t = 0;
            trajectory = [];  
            isPlaying = false;
            playBtn.innerText = "Play";

            document.getElementById('bVal').innerText = parseFloat(bSlider.value).toFixed(1);
            document.getElementById('qVal').innerText = parseFloat(qSlider.value).toFixed(1);
            document.getElementById('vVal').innerText = vSlider.value;
            document.getElementById('mVal').innerText = parseFloat(mSlider.value).toFixed(1);
            document.getElementById('yInVal').innerText = yInSlider.value;
        }

        playBtn.onclick = () => { isPlaying = !isPlaying; playBtn.innerText = isPlaying ? "Pause" : "Play"; };
        resetBtn.onclick = initPhysics;
        
        [qSignSelect, bDirSelect, bSlider, qSlider, vSlider, mSlider, yInSlider].forEach(el => el.onchange = el.oninput = initPhysics);

        function drawArrow(fromX, fromY, toX, toY, color, lineWidth = 2) {
            let headlen = 10; 
            let dx = toX - fromX;
            let dy = toY - fromY;
            let angle = Math.atan2(dy, dx);
            ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = lineWidth;
            ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.fill();
        }

        initPhysics();

        function loop() {
            let B = parseFloat(bSlider.value) * parseInt(bDirSelect.value);
            let q = parseFloat(qSlider.value) * parseInt(qSignSelect.value);
            let m = parseFloat(mSlider.value);

            if (isPlaying) {
                let dt = 0.05; 
                
                // Έλεγχος αν βρίσκεται μέσα στα όρια του πεδίου
                if (x >= xMinPixels && x <= xMaxPixels && y >= yMinPixels && y <= yMaxPixels) {
                    // Σωστή Φυσική Lorentz: 
                    // Στο φυσικό σύστημα (y προς τα πάνω): ax = q*vy_phys*B / m  και  ay_phys = -q*vx_phys*B / m
                    // Επειδή στο Canvas το y πάει προς τα κάτω, οι ταχύτητες vy_canvas = -vy_phys και οι επιταχύνσεις ax_canvas = -q*vy_canvas*B/m, ay_canvas = q*vx_canvas*B/m
                    let ax = -(q * vy * B) / m;
                    let ay = (q * vx * B) / m;
                    
                    vx += ax * dt;
                    vy += ay * dt;
                }
                
                x += vx * dt;
                y += vy * dt;
                t += dt;

                trajectory.push({x: x, y: y});

                if (x > canvas.width || x < 0 || y > canvas.height || y < 0) { isPlaying = false; playBtn.innerText = "Play"; }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Περιοχή πεδίου B (Πάνω και Δεξί διακεκομμένο όριο)
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(xMinPixels, yMinPixels); ctx.lineTo(xMaxPixels, yMinPixels);
            ctx.lineTo(xMaxPixels, yMaxPixels);
            ctx.stroke();
            ctx.setLineDash([]);

            // Σχεδίαση "X" ή "•"
            ctx.fillStyle = 'rgba(255, 0, 0, 0.25)'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
            let symbol = (B > 0) ? "X" : "•";
            for (let px = xMinPixels + 40; px < xMaxPixels; px += 80) {
                for (let py = yMinPixels + 40; py < yMaxPixels; py += 80) {
                    ctx.fillText(symbol, px, py);
                }
            }

            // 2. Σχεδίαση Αξόνων
            drawArrow(xMinPixels, yMaxPixels, xMinPixels, yMinPixels - 15, 'black', 2); // y
            drawArrow(xMinPixels, yMaxPixels, xMaxPixels + 15, yMaxPixels, 'black', 2); // x

            // Ticks Άξονα x
            ctx.fillStyle = 'black'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
            for (let offset = 0; offset <= 500; offset += 100) {
                let tickX = xMinPixels + offset;
                ctx.beginPath(); ctx.moveTo(tickX, yMaxPixels); ctx.lineTo(tickX, yMaxPixels + 4); ctx.stroke();
                ctx.fillText(offset + "m", tickX, yMaxPixels + 18);
            }
            ctx.font = 'bold 12px sans-serif'; ctx.fillText("x", xMaxPixels + 25, yMaxPixels + 4);

            // Ticks Άξονα y
            ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
            for (let offset = 0; offset <= 400; offset += 100) {
                let tickY = yMaxPixels - offset;
                ctx.beginPath(); ctx.moveTo(xMinPixels, tickY); ctx.lineTo(xMinPixels - 4, tickY); ctx.stroke();
                ctx.fillText(offset + "m", xMinPixels - 8, tickY + 4);
            }
            ctx.font = 'bold 12px sans-serif'; ctx.fillText("y", xMinPixels - 4, yMinPixels - 22);

            // 3. Τροχιά
            ctx.strokeStyle = 'black'; ctx.lineWidth = 2.5;
            ctx.beginPath();
            if(trajectory.length > 0) {
                ctx.moveTo(trajectory[0].x, trajectory[0].y);
                for(let p of trajectory) ctx.lineTo(p.x, p.y);
                ctx.stroke();
            }

            // 4. Διανύσματα (100% Κάθετα μεταξύ τους)
            let scaleV = 1.5; 
            let scaleF = 2.0; 
            
            if (x > 0 && x < canvas.width) {
                // Βέλος Ταχύτητας v (Μπλε)
                drawArrow(x, y, x + vx * scaleV, y + vy * scaleV, 'blue');
                
                // Βέλος Δύναμης F (Κόκκινο) - Υπολογίζεται ώστε να είναι πάντα μαθηματικά κάθετο στο v
                if (x >= xMinPixels && x <= xMaxPixels && y >= yMinPixels && y <= yMaxPixels) {
                    // Στο κατάλληλο σύστημα, η Lorentz είναι Fx_canvas = -vy * B * σταθερά, Fy_canvas = vx * B * σταθερά
                    let Fx_arrow = -(vy * B) * scaleF;
                    let Fy_arrow = (vx * B) * scaleF;
                    
                    // Αν το φορτίο είναι αρνητικό, η δύναμη αλλάζει φορά
                    if (q < 0) {
                        Fx_arrow = -Fx_arrow;
                        Fy_arrow = -Fy_arrow;
                    }
                    drawArrow(x, y, x + Fx_arrow, y + Fy_arrow, 'red');
                }
            }

            // 5. Φορτίο
            ctx.beginPath(); ctx.arc(x, y, 9, 0, 2 * Math.PI);
            ctx.fillStyle = 'black'; ctx.fill();

            // 6. Κείμενα
            ctx.fillStyle = 'black'; ctx.font = '15px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText("t = " + t.toFixed(2) + " s", 20, 20);
            
            ctx.fillStyle = 'blue'; ctx.fillText("➔ Ταχύτητα (v)", 450, 20);
            ctx.fillStyle = 'red'; ctx.fillText("➔ Δύναμη Lorentz (F)", 450, 43);

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
